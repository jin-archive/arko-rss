name: Generate ARKO & ArtsArchive RSS Feeds

on:
  schedule:
    - cron: '0 1 * * *' # 매일 한국시간 오전 10시 실행
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 feedgen pytz

    - name: Run ARKO Recruit RSS Script
      run: python generate_arko_rss.py

    - name: Run ArtsArchive Notice RSS Script
      run: python generate_artsarchive_rss.py

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add arko_rss.xml artsarchive_rss.xml
        
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update ARKO RSS feeds" && git push)
